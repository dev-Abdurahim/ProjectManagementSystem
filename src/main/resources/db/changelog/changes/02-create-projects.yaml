databaseChangeLog:
  - changeSet:
      id: 02-create-projects
      author: Abdurahim
      changes:
        - createTable:
            tableName: projects
            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: created_at
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: revenue
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false

              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: end_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: working_days
                  type: INTEGER
                  constraints:
                    nullable: false

              - column:
                  name: project_manager
                  type: VARCHAR(100)

              - column:
                  name: plan_percentage
                  type: DECIMAL(5,2)

              - column:
                  name: actual_percentage
                  type: DECIMAL(5,2)

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: projects
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_project_owner