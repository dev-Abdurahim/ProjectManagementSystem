databaseChangeLog:
  - changeSet:
      id: 03-create-monthly-allocations
      author: Abdurahim
      changes:
        - createTable:
            tableName: monthly_allocations
            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: created_at
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: month_year
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: monthly_allocations
            baseColumnNames: project_id
            constraintName: fk_monthly_allocation_project
            referencedTableName: projects
            referencedColumnNames: id