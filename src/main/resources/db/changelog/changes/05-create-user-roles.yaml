databaseChangeLog:
  - changeSet:
      id: 05-create-user-roles
      author: Abdurahim
      changes:
        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            constraintName: fk_user_roles_user
            referencedTableName: users
            referencedColumnNames: id

        - addUniqueConstraint:
            tableName: user_roles
            columnNames: user_id, role
            constraintName: uk_user_roles_unique